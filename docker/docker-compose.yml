version: '3.8'

services:
  fastapi-yolo:
    build:
      context: ..
      dockerfile: docker/dockerfile
    ports:
      - "6050:6050"
    volumes:
      - ../app:/app/app
      - ../requirements.txt:/app/requirements.txt
      - ../model_config.json:/app/model_config.json
      - /root/.config/Ultralytics:/root/.config/Ultralytics
    environment:
      - PYTHONPATH=/app
    command: python -m uvicorn --app-dir /app app.main:app --host 0.0.0.0 --port 6050 --reload
    restart: unless-stopped
