services:
  fastapi-yolo:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "6050:6050"
    volumes:
      - ../app:/app/app
      - ../model_config.json:/app/model_config.json
      - ../requirements.txt:/app/requirements.txt
    environment:
      - PYTHONPATH=/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 6050 --reload
    restart: unless-stopped
